# Creative Companion — Netlify SPA deploy
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Helper AI proxy (set XAI_API_KEY in Netlify env — not VITE_*)
[[redirects]]
  from = "/api/xai/chat/completions"
  to = "/.netlify/functions/xai-proxy"
  status = 200
  force = true

# SPA: all routes → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=*, payment=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://api.x.ai; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https://*.supabase.co https://api.x.ai; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
